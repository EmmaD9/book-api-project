<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Book Data API: Client Side</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="/client.js" defer></script>

</head>

<body> 
    <header class="hero is-small is-info is-bold p-2">
        <div class="hero-body">
            <a href="documentation.html" target="_blank">
                <span class="icon-text has-text-black">
                    <span class="icon">
                        <i class="fa-solid fa-bookmark"></i>
                    </span>
                    <span>Documentation</span>
                </span></a>
            <div class="container">
                <h1 class="title">Book Data API</h1>
                <br>
                <h2 class="subtitle">A Node.js web server that both hosts static files such as HTML, and hosts a backend web API from a JSON file about books.</h2>
            </div>
        </div>
    </header>

    <br><br>

    <div class="container">
        <h2 class="subtitle"></h2>
        <div class="notification is-primary">
            <span class="icon-text">
                <span class="icon">
                    <i class="fa-solid fa-book"></i>
                </span>
                <span class="subtitle">Get All Books</span>

            </span>

            <br>
            <div class="button" id="get-books-button">GET</div>
            <div class="button" id="head-books-button">HEAD</div>
            <br>
            <div id="books-content"></div>
        </div>
    </div>

    <br>

    <div class="container">
        <div class="notification is-primary">
            <span class="icon-text">
                <span class="icon">
                    <i class="fa-solid fa-book-open-reader"></i>
                </span>
                <span class="subtitle">Find Books by Author</span>
            </span>
            <br><br>
            <input class="input" type="text" id = "author-input" placeholder="Author" />
            <br><br>
            <div class="button" id="get-authors-button">GET</div>
            <div class="button" id="head-authors-button">HEAD</div>
            <br>
            <div id="authors-content"></div>

        </div>
    </div>

    <br>

    <div class="container">
        <div class="notification is-primary">
            <span class="icon-text">
                <span class="icon">
                    <i class="fa-solid fa-heading"></i>
                </span>
                <span class="subtitle">Find Books by Title</span>
            </span>
            <br><br>
            <input class="input" type="text" id="title-input" placeholder="Title" />
            <br><br>
            <div class="button" id="get-titles-button">GET</div>
            <div class="button" id="head-titles-button">HEAD</div>
            <br>
            <div id="titles-content"></div>
        </div>
    </div>

    <br>

    <div class="container">
        <div class="notification is-primary">
            <span class="icon-text">
                <span class="icon">
                    <i class="fa-solid fa-calendar"></i>
                </span>
                <span class="subtitle">Find Books by Year</span>
            </span>
            <br><br>
            <input class="input" type="number" id="title-input" placeholder="Year Published" />
            <br><br>
            <div class="button" id="get-years-button">GET</div>
            <div class="button" id="head-years-button">HEAD</div>
            <br>
            <div id="years-content"></div>
        </div>
    </div>
</body>


</html>
